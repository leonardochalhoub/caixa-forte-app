name: CI

# Conselho v2-v4 cobrou CI cobrindo typecheck, lint, tests + RLS
# integration condicional (requer secrets do Supabase de teste).
# E2E Playwright fica pra workflow separado (precisa Supabase local
# em docker-compose, esforço de outra ordem).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck + Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test
        env:
          # Specs unit não dependem de Supabase real (rls.spec.ts é
          # skipped sem SUPABASE_URL). Valores dummy só pra Next runtime
          # não reclamar de env ausente em build steps.
          NEXT_PUBLIC_SUPABASE_URL: "https://ci.placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "ci-placeholder-anon-key"

      # RLS integration roda só quando secrets estão setados.
      # Configurar em GitHub Secrets:
      #   SUPABASE_TEST_URL, SUPABASE_TEST_ANON_KEY, SUPABASE_TEST_SERVICE_KEY
      # Apontando pra um project de teste separado (NÃO usar prod).
      # Sem os secrets, este step roda mas vitest skipa via maybeDescribe.
      - name: RLS integration tests (conditional)
        if: env.SUPABASE_TEST_URL != ''
        run: npm test -- tests/integration/rls.spec.ts
        env:
          SUPABASE_TEST_URL: ${{ secrets.SUPABASE_TEST_URL }}
          SUPABASE_TEST_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
          SUPABASE_TEST_SERVICE_KEY: ${{ secrets.SUPABASE_TEST_SERVICE_KEY }}
